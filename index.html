<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Web Rhythm Game</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 400px;
            height: 600px;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            box-sizing: border-box;
            padding: 20px;
            text-align: center;
        }

        .active {
            display: flex;
        }

        h1 { margin-bottom: 10px; color: #00e5ff; }
        p { color: #aaa; margin-bottom: 30px; }

        .btn {
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 80%;
            margin: 10px 0;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        .song-card {
            background: #2a2a2a;
            border: 2px solid #00e5ff;
            border-radius: 10px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: left;
        }

        .song-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .song-info { font-size: 14px; color: #bbb; margin-bottom: 12px; }
        .difficulty { 
            display: inline-block; 
            background-color: #ff0055; 
            color: white; 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-weight: bold;
            font-size: 12px;
        }

        canvas {
            border: 2px solid #444;
            background-color: #000;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="lobbyScreen" class="screen active">
        <h1>RHYTHM GAME</h1>
        <p>웹으로 즐기는 건반형 리듬게임</p>
        <button class="btn" onclick="showScreen('selectScreen')">GAME START</button>
    </div>

    <div id="selectScreen" class="screen">
        <h2>곡 선택</h2>
        <div class="song-card">
            <div class="song-title">테스트 곡</div>
            <div class="song-info">BPM: 120 | 4 Keys</div>
            <span class="difficulty">HARD Lv.5</span>
        </div>
        <button class="btn" onclick="startGame()">PLAY</button>
        <button class="btn" style="background: #444;" onclick="showScreen('lobbyScreen')">뒤로 가기</button>
    </div>

    <div id="gameScreen" class="screen" style="padding: 0; background: transparent; border: none;">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script>
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const keys = ['d', 'f', 'j', 'k'];
        const laneWidth = 100;
        const judgeLineY = 500;
        let isGaming = false;
        let startTime = 0;
        let speed = 450;

        // 점수 및 판정 관련 변수
        let score = 0;
        let combo = 0;
        let lastJudgeText = "";
        let lastJudgeColor = "#fff";
        let judgeTimer = 0;

        let notes = [];
        const originalNotes = [
            { lane: 0, time: 1.5 }, { lane: 1, time: 2.0 }, { lane: 2, time: 2.5 }, { lane: 3, time: 3.0 },
            { lane: 2, time: 3.5 }, { lane: 1, time: 4.0 }, { lane: 0, time: 4.5 },
            { lane: 0, time: 5.5 }, { lane: 3, time: 5.5 },
            { lane: 1, time: 6.0 }, { lane: 2, time: 6.25 }, { lane: 1, time: 6.5 }, { lane: 2, time: 6.75 },
            { lane: 0, time: 7.5 }, { lane: 1, time: 7.75 }, { lane: 2, time: 8.0 }, { lane: 3, time: 8.25 },
            { lane: 2, time: 8.5 }, { lane: 1, time: 8.75 }, { lane: 0, time: 9.0 },
            { lane: 0, time: 10.0 }, { lane: 2, time: 10.0 },
            { lane: 1, time: 10.5 }, { lane: 3, time: 10.5 },
            { lane: 0, time: 11.0 }, { lane: 1, time: 11.0 }, { lane: 2, time: 11.0 }, { lane: 3, time: 11.0 },
            { lane: 1, time: 12.0 }, { lane: 2, time: 12.3 }, { lane: 1, time: 12.6 },
            { lane: 0, time: 13.5 }, { lane: 3, time: 13.5 }
        ];

        function startGame() {
            showScreen('gameScreen');
            notes = JSON.parse(JSON.stringify(originalNotes));
            startTime = Date.now();
            score = 0;
            combo = 0;
            lastJudgeText = "";
            isGaming = true;
            requestAnimationFrame(update);
        }

        function triggerJudge(text, color, addScore, isHit) {
            lastJudgeText = text;
            lastJudgeColor = color;
            judgeTimer = 30; // 판정 문구 유지 프레임 수
            if (isHit) {
                combo++;
                score += addScore;
            } else {
                combo = 0; // MISS시 콤보 리셋
            }
        }

        function update() {
            if (!isGaming) return;

            let currentTime = (Date.now() - startTime) / 1000;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 레인 구분선
            for (let i = 1; i < 4; i++) {
                ctx.strokeStyle = "#333";
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, canvas.height);
                ctx.stroke();
            }

            // 판정선
            ctx.strokeStyle = "#ff0055";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, judgeLineY);
            ctx.lineTo(canvas.width, judgeLineY);
            ctx.stroke();

            // 노트 그리기 및 놓친 노트(MISS) 검사
            for (let i = notes.length - 1; i >= 0; i--) {
                let note = notes[i];
                let timeDiff = note.time - currentTime;
                let noteY = judgeLineY - (timeDiff * speed);

                // 판정선을 지나쳐버린 경우 -> MISS 처리
                if (timeDiff < -0.16) {
                    triggerJudge("MISS", "#ff3333", 0, false);
                    notes.splice(i, 1);
                    continue;
                }

                if (noteY > -20 && noteY < canvas.height + 20) {
                    ctx.fillStyle = "#00e5ff";
                    ctx.fillRect(note.lane * laneWidth + 8, noteY - 10, laneWidth - 16, 20);
                }
            }

            // UI 표시 (점수)
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 20px sans-serif";
            ctx.textAlign = "left";
            ctx.fillText(`SCORE: ${score}`, 15, 35);

            // 판정 및 콤보 연출
            if (judgeTimer > 0) {
                judgeTimer--;
                ctx.textAlign = "center";
                
                // 판정 텍스트 (NICE / GOOD / MISS)
                ctx.fillStyle = lastJudgeColor;
                ctx.font = "italic bold 36px sans-serif";
                ctx.fillText(lastJudgeText, canvas.width / 2, 300);

                // 콤보 표시
                if (combo > 1) {
                    ctx.fillStyle = "#ffffff";
                    ctx.font = "bold 22px sans-serif";
                    ctx.fillText(`${combo} COMBO`, canvas.width / 2, 335);
                }
            }

            // 게임 종료 조건
            if (notes.length === 0 && currentTime > 14.5) {
                isGaming = false;
                alert(`Game Clear!\n최종 점수: ${score}`);
                showScreen('selectScreen');
                return;
            }

            requestAnimationFrame(update);
        }

        // 키보드 입력 처리 및 판정 로직
        window.addEventListener('keydown', (e) => {
            if (!isGaming) return;
            const keyIndex = keys.indexOf(e.key.toLowerCase());
            if (keyIndex !== -1) {
                checkHit(keyIndex);
            }
        });

        function checkHit(lane) {
            let currentTime = (Date.now() - startTime) / 1000;
            
            // 해당 레인에서 가장 가까운 노트 찾기
            let targetIndex = -1;
            let minDiff = 999;

            for (let i = 0; i < notes.length; i++) {
                if (notes[i].lane === lane) {
                    let diff = Math.abs(notes[i].time - currentTime);
                    if (diff < minDiff) {
                        minDiff = diff;
                        targetIndex = i;
                    }
                }
            }

            // 판정 세부 계산
            if (targetIndex !== -1 && minDiff <= 0.16) {
                if (minDiff <= 0.08) {
                    // NICE (최상)
                    triggerJudge("NICE", "#00e5ff", 500, true);
                } else {
                    // GOOD (보통)
                    triggerJudge("GOOD", "#00ff66", 300, true);
                }
                notes.splice(targetIndex, 1);
            }
        }
    </script>
</body>
</html>
