<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Rhythm Game</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 650px;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            padding: 20px;
            text-align: center;
        }

        .active { display: flex; }
        h1 { margin-bottom: 10px; color: #00e5ff; }
        p { color: #aaa; margin-bottom: 30px; }

        .btn {
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 80%;
            margin: 10px 0;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        /* 곡 목록 스크롤 영역 */
        #songListContainer {
            width: 100%;
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .song-card {
            background: #2a2a2a;
            border: 2px solid #333;
            border-radius: 10px;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .song-card.selected {
            border-color: #00e5ff;
            background: #333;
        }

        .song-title { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 6px; }
        .song-info { font-size: 13px; color: #bbb; margin-bottom: 8px; }
        .difficulty { 
            display: inline-block; 
            background-color: #ff0055; 
            color: white; 
            padding: 3px 6px; 
            border-radius: 4px; 
            font-weight: bold;
            font-size: 11px;
        }

        .result-status { font-size: 32px; font-weight: 900; font-style: italic; margin-bottom: 15px; }
        .result-box { background-color: #2a2a2a; border-radius: 10px; width: 100%; padding: 20px; margin-bottom: 20px; }
        .result-row { display: flex; justify-content: space-between; font-size: 18px; margin: 10px 0; font-weight: bold; }
        .count-nice { color: #00e5ff; }
        .count-good { color: #00ff66; }
        .count-miss { color: #ff3333; }

        canvas {
            border: 2px solid #444;
            background-color: #000;
            border-radius: 8px;
            max-height: 85vh;
            max-width: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="lobbyScreen" class="screen active">
        <h1>RHYTHM GAME</h1>
        <p>웹으로 즐기는 건반형 리듬게임</p>
        <button class="btn" onclick="showScreen('selectScreen')">GAME START</button>
    </div>

    <div id="selectScreen" class="screen">
        <h2>곡 선택</h2>
        <div id="songListContainer"></div>
        <button class="btn" onclick="playSelectedSong()">PLAY</button>
        <button class="btn" style="background: #444;" onclick="showScreen('lobbyScreen')">뒤로 가기</button>
    </div>

    <div id="gameScreen" class="screen" style="padding: 0; background: transparent; border: none; height: auto;">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <div id="resultScreen" class="screen">
        <div id="clearStatus" class="result-status">STAGE CLEAR</div>
        <div class="result-box">
            <div class="result-row"><span>SCORE</span><span id="finalScore" style="color:#ffcc00;">0</span></div>
            <hr style="border: 0.5px solid #444; margin: 15px 0;">
            <div class="result-row"><span class="count-nice">NICE</span><span id="niceCount">0</span></div>
            <div class="result-row"><span class="count-good">GOOD</span><span id="goodCount">0</span></div>
            <div class="result-row"><span class="count-miss">MISS</span><span id="missCount">0</span></div>
        </div>
        <button class="btn" onclick="showScreen('selectScreen')">곡 선택으로 돌아가기</button>
    </div>

    <script src="songs.js"></script>
<script src="game.js"></script>
</body>
</html>
