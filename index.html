<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 리듬게임</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 화면 컨테이너 */
        .container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        /* 각 화면 공통 스타일 */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        /* 1. 곡 선택 화면 */
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        .song-list {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .song-card {
            background-color: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .song-card:hover {
            background-color: #333;
        }

        .song-card.selected {
            border-color: #00e5ff;
            background-color: #253545;
        }

        .song-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .song-info {
            font-size: 13px;
            color: #aaa;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #00e5ff;
            color: #111;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #00b3cc;
        }

        /* 2. 게임 화면 */
        #gameCanvas {
            background-color: #050505;
            display: block;
        }

        /* 3. 결과 화면 */
        .result-box {
            width: 100%;
            background-color: #222;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .result-score {
            font-size: 32px;
            font-weight: bold;
            color: #00e5ff;
            margin: 10px 0 20px 0;
        }

        .result-detail {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
            font-size: 15px;
        }

        .result-detail p {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }

        .res-perfect { color: #00e5ff; }
        .res-good { color: #00ff88; }
        .res-bad { color: #ffbb00; }
        .res-miss { color: #ff3355; }
        .res-maxcombo { color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <div id="selectScreen" class="screen active">
            <h1>SELECT SONG</h1>
            <div id="songList" class="song-list">
                </div>
            <button class="btn" onclick="playSelectedSong()">START GAME</button>
        </div>

        <div id="gameScreen" class="screen" style="padding: 0;">
            <canvas id="gameCanvas" width="400" height="600"></canvas>
        </div>

        <div id="resultScreen" class="screen">
            <h1>RESULT</h1>
            <div class="result-box">
                <div>TOTAL SCORE</div>
                <div id="resultScore" class="result-score">0</div>

                <div class="result-detail">
                    <p>PERFECT <span id="resPerfect" class="res-perfect">0</span></p>
                    <p>GOOD <span id="resGood" class="res-good">0</span></p>
                    <p>BAD <span id="resBad" class="res-bad">0</span></p>
                    <p>MISS <span id="resMiss" class="res-miss">0</span></p>
                    <p>MAX COMBO <span id="resMaxCombo" class="res-maxcombo">0</span></p>
                </div>
            </div>
            <button class="btn" onclick="showSelectScreen()">SONG SELECT</button>
        </div>
    </div>

    <script src="songs/anzs_raid.js"></script>
    <script src="songs/리푸즈.js"></script>
    <script src="songs/매인랜드 이즈 백.js"></script>
    <script src="songs/테스트1.js"></script>
      <script src="songs/테스트2.js"></script>
    <script src="songs/ㅌ.js"></script>
    <script src="game.js"></script>
</body>
</html>
